server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: oa-system
  profiles:
    active: dev
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    default-property-inclusion: non_null

# 日志配置
logging:
  level:
    com.oasystem: DEBUG
    com.baomidou.mybatisplus: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n"

# JWT配置
jwt:
  secret: oa-system-jwt-secret-key-for-graduation-project-2024
  expiration: 1800000          # Access Token 30分钟有效期（30 * 60 * 1000）
  refresh-expiration: 604800000 # Refresh Token 7天有效期（7 * 24 * 60 * 60 * 1000）
  token-prefix: Bearer
  header: Authorization
