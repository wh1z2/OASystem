openapi: 3.0.3
info:
  title: OA系统 - 审批流程API测试用例
  description: |
    阶段六+权限优化：审批流程核心功能接口测试用例规范文档（v1.1）。
    包含审批工单的创建、查询、提交、审批、重新编辑、撤销等完整流程测试。
    覆盖正常流程、异常流程、权限控制、状态机校验等测试场景。

    ## 权限系统优化说明（v1.1）

    ### 4级审批权限层级
    1. **直接审批** (DIRECT): 指定审批人审批自己的工单
    2. **管理员代审批** (PROXY_ADMIN): 系统管理员(role=admin)拥有`approval:execute:all`权限时，可代审批所有部门工单
    3. **部门经理代审批** (PROXY_MANAGER): 部门经理(role=manager)拥有`approval:execute:dept`权限时，可代审批本部门工单
    4. **无权限**: 普通员工不能代审批

    ### 代审批审计追踪
    - 历史记录中标记`isProxy`和`approvalType`字段
    - 记录`originalApproverId`原指定审批人信息
    - 审批意见自动附加代审批标识，如"[管理员代审批] 同意"
  version: 1.1.0
  contact:
    name: OA System Team

servers:
  - url: http://localhost:8080/api
    description: 本地开发环境（Spring Boot后端服务）

security:
  - bearerAuth: []

tags:
  - name: 审批管理
    description: 审批工单的创建、查询、更新、删除等基础CRUD操作
  - name: 审批流程
    description: |
      审批工单的提交、审批、重新编辑、撤销等流程操作。
      支持4级审批权限：直接审批 > 管理员代审批 > 部门经理代审批 > 无权限
  - name: 审批查询
    description: 待办列表、已办列表、审批历史等查询接口
  - name: 权限说明
    description: |
      审批权限系统说明：
      - 直接审批：指定审批人可审批自己的工单
      - 管理员代审批：需 role=admin + permission=approval:execute:all，可审批所有部门
      - 部门经理代审批：需 role=manager + permission=approval:execute:dept，限本部门
      - 代审批信息通过历史记录中的 approvalType/isProxy/originalApproverId 字段追踪

paths:
  # ==================== 审批基础CRUD接口 ====================
  /approvals:
    post:
      tags:
        - 审批管理
      summary: 创建审批工单
      description: |
        **测试对象**: 创建审批工单接口（`POST /approvals`）
        **测试目的**: 验证用户可成功创建审批工单，初始状态为草稿。
        **前置条件**: 用户已登录并获取JWT Token；数据库中存在审批人用户。
        **测试步骤**:
        1. 构造创建审批请求体（title, type, content, formData, currentApproverId）
        2. 发送POST请求到`/approvals`
        3. 根据场景断言响应状态码、响应体结构和字段值
        4. 验证数据库中工单状态为草稿（status=0）
      operationId: createApproval
      requestBody:
        required: true
        description: 创建审批工单请求参数
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApprovalCreateRequest'
            examples:
              TC-CREATE-001-正常创建请假审批:
                summary: "【正常】创建请假审批"
                description: 创建请假类型审批工单，指定经理为审批人
                value:
                  title: "请假申请-2024年3月"
                  type: 1
                  priority: 1
                  content: "因家中有事，申请请假3天"
                  formData: '{"leaveType": "事假", "startDate": "2024-03-15", "endDate": "2024-03-17", "days": 3}'
                  currentApproverId: 2
              TC-CREATE-002-正常创建报销审批:
                summary: "【正常】创建报销审批"
                description: 创建报销类型审批工单，高优先级
                value:
                  title: "差旅费报销"
                  type: 2
                  priority: 2
                  content: "出差上海差旅费用报销"
                  formData: '{"amount": 1580.50, "invoiceCount": 5, "expenseItems": [{"type": "交通", "amount": 580}, {"type": "住宿", "amount": 1000}]}'
                  currentApproverId: 2
              TC-CREATE-003-标题为空:
                summary: "【异常】标题为空"
                description: 审批标题为空字符串，预期返回400参数校验失败
                value:
                  title: ""
                  type: 1
                  content: "测试内容"
                  currentApproverId: 2
              TC-CREATE-004-类型为空:
                summary: "【异常】审批类型为空"
                description: 未指定审批类型，预期返回400参数校验失败
                value:
                  title: "测试审批"
                  content: "测试内容"
                  currentApproverId: 2
              TC-CREATE-005-表单数据为JSON:
                summary: "【正常】复杂表单数据"
                description: 表单数据为复杂JSON结构，验证可正确存储
                value:
                  title: "采购申请-办公设备"
                  type: 3
                  priority: 1
                  content: "申请采购开发用笔记本电脑"
                  formData: '{"items": [{"name": "MacBook Pro", "quantity": 2, "unitPrice": 14999, "total": 29998}], "budgetSource": "研发经费", "urgency": "normal"}'
                  currentApproverId: 2
      responses:
        '200':
          description: |
            接口调用成功（HTTP 200），业务结果通过code字段区分：
            - code=200: 创建成功，返回工单ID
            - code=400: 参数校验失败
            - code=401: 认证失败（Token缺失、无效或过期）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultLong'
              examples:
                TC-CREATE-001-预期响应-成功:
                  summary: 创建成功响应
                  value:
                    code: 200
                    message: "success"
                    data: 1001
                    timestamp: 1711700000000
                TC-CREATE-003-预期响应-参数错误:
                  summary: 标题为空响应
                  value:
                    code: 400
                    message: "title: 审批标题不能为空"
                    data: null
                    timestamp: 1711700000000
                TC-CREATE-004-预期响应-参数错误:
                  summary: 类型为空响应
                  value:
                    code: 400
                    message: "type: 审批类型不能为空"
                    data: null
                    timestamp: 1711700000000
                TC-AUTH-001-预期响应-Token缺失:
                  summary: Token缺失
                  value:
                    code: 401
                    message: "请求未携带Token，请先登录"
                    data: null
                    timestamp: 1711700000000
                TC-AUTH-002-预期响应-Token无效:
                  summary: Token无效
                  value:
                    code: 401
                    message: "Token无效，请重新登录"
                    data: null
                    timestamp: 1711700000000
                TC-AUTH-003-预期响应-Token过期:
                  summary: Token过期
                  value:
                    code: 401
                    message: "Token已过期，请重新登录"
                    data: null
                    timestamp: 1711700000000

    get:
      tags:
        - 审批管理
      summary: 分页查询审批工单列表
      description: |
        **测试对象**: 分页查询工单列表接口（`GET /approvals`）
        **测试目的**: 验证可按条件分页查询审批工单列表。
        **前置条件**: 数据库中已存在审批工单数据。
        **测试步骤**:
        1. 构造查询参数（title, type, status, applicantId, pageNum, pageSize）
        2. 发送GET请求到`/approvals`
        3. 断言响应包含分页数据和总记录数
      operationId: listApprovals
      parameters:
        - name: title
          in: query
          description: 审批标题（模糊查询）
          schema:
            type: string
          examples:
            TC-LIST-001-模糊查询:
              summary: 按标题模糊查询
              value: "请假"
        - name: type
          in: query
          description: 审批类型（1请假，2报销，3采购，4加班，5出差）
          schema:
            type: integer
          examples:
            TC-LIST-002-按类型查询:
              summary: 按请假类型查询
              value: 1
        - name: status
          in: query
          description: 审批状态（0草稿，1审批中，2已通过，3已打回，4已撤销）
          schema:
            type: integer
          examples:
            TC-LIST-003-按状态查询:
              summary: 按草稿状态查询
              value: 0
        - name: applicantId
          in: query
          description: 申请人ID
          schema:
            type: integer
            format: int64
          examples:
            TC-LIST-004-按申请人查询:
              summary: 按申请人查询
              value: 3
        - name: pageNum
          in: query
          description: 当前页码（默认1）
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          description: 每页大小（默认10）
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: 查询成功，返回分页结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultPageApprovalDetailResponse'
              examples:
                TC-LIST-001-预期响应:
                  summary: 分页查询响应
                  value:
                    code: 200
                    message: "success"
                    data:
                      list:
                        - id: 1001
                          title: "请假申请-2024年3月"
                          type: 1
                          typeName: "请假申请"
                          applicantId: 3
                          applicantName: "李四"
                          currentApproverId: 2
                          currentApproverName: "张经理"
                          status: 0
                          statusName: "草稿"
                          priority: 1
                          priorityName: "普通"
                          content: "因家中有事，申请请假3天"
                          createTime: "2024-03-10T09:00:00"
                          updateTime: "2024-03-10T09:00:00"
                        - id: 1002
                          title: "差旅费报销"
                          type: 2
                          typeName: "报销申请"
                          applicantId: 3
                          applicantName: "李四"
                          currentApproverId: null
                          currentApproverName: null
                          status: 0
                          statusName: "草稿"
                          priority: 2
                          priorityName: "紧急"
                          content: "出差上海差旅费用报销"
                          createTime: "2024-03-09T14:30:00"
                          updateTime: "2024-03-09T14:30:00"
                      total: 25
                      pageNum: 1
                      pageSize: 10
                      pages: 3
                    timestamp: 1711700000000

  /approvals/{id}:
    get:
      tags:
        - 审批管理
      summary: 获取审批工单详情
      description: |
        **测试对象**: 获取工单详情接口（`GET /approvals/{id}`）
        **测试目的**: 验证可根据ID查询工单详情。
        **前置条件**: 数据库中已存在指定ID的工单。
        **测试步骤**:
        1. 发送GET请求到`/approvals/{id}`
        2. 断言响应包含完整工单信息
      operationId: getApprovalById
      parameters:
        - name: id
          in: path
          required: true
          description: 工单ID
          schema:
            type: integer
            format: int64
          examples:
            TC-GET-001-存在ID:
              summary: 存在的工单ID
              value: 1001
            TC-GET-002-不存在ID:
              summary: 不存在的工单ID
              value: 99999
      responses:
        '200':
          description: |
            接口调用成功（HTTP 200），业务结果通过code字段区分：
            - code=200: 查询成功，返回工单详情
            - code=401: 认证失败（Token缺失、无效或过期）
            - code=404: 工单不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultApprovalDetailResponse'
              examples:
                TC-GET-001-预期响应-成功:
                  summary: 工单详情响应
                  value:
                    code: 200
                    message: "success"
                    data:
                      id: 1001
                      title: "请假申请-2024年3月"
                      type: 1
                      typeName: "请假申请"
                      applicantId: 3
                      applicantName: "李四"
                      currentApproverId: 2
                      currentApproverName: "张经理"
                      status: 1
                      statusName: "审批中"
                      priority: 1
                      priorityName: "普通"
                      content: "因家中有事，申请请假3天"
                      formData: '{"leaveType": "事假", "startDate": "2024-03-15", "endDate": "2024-03-17", "days": 3}'
                      createTime: "2024-03-10T09:00:00"
                      updateTime: "2024-03-10T10:30:00"
                    timestamp: 1711700000000
                TC-GET-002-预期响应-不存在:
                  summary: 工单不存在响应
                  value:
                    code: 404
                    message: "审批工单不存在"
                    data: null
                    timestamp: 1711700000000
                TC-AUTH-001-预期响应-Token缺失:
                  summary: Token缺失
                  value:
                    code: 401
                    message: "请求未携带Token，请先登录"
                    data: null
                    timestamp: 1711700000000

  /approvals/{id}/update:
    post:
      tags:
        - 审批管理
      summary: 更新审批工单
      description: |
        **测试对象**: 更新工单接口（`POST /approvals/{id}/update`）
        **测试目的**: 验证只有草稿状态的工单可以编辑更新。
        **前置条件**: 工单存在且状态为草稿；用户是申请人。
        **测试步骤**:
        1. 构造更新请求体
        2. 发送POST请求到`/approvals/{id}/update`
        3. 验证更新结果
      operationId: updateApproval
      parameters:
        - name: id
          in: path
          required: true
          description: 工单ID
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        description: 更新审批工单请求参数
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApprovalUpdateRequest'
            examples:
              TC-UPDATE-001-正常更新:
                summary: "【正常】更新草稿工单"
                description: 更新草稿状态的工单
                value:
                  title: "请假申请-2024年3月（更新）"
                  priority: 2
                  content: "因家中有事，申请请假3天（补充说明）"
                  formData: '{"leaveType": "事假", "startDate": "2024-03-15", "endDate": "2024-03-17", "days": 3, "reason": "家中有事"}'
                  currentApproverId: 2
              TC-UPDATE-002-标题为空:
                summary: "【异常】标题为空"
                description: 标题为空字符串，预期返回400
                value:
                  title: ""
                  content: "测试内容"
      responses:
        '200':
          description: |
            接口调用成功（HTTP 200），业务结果通过code字段区分：
            - code=200: 更新成功
            - code=400: 参数校验失败
            - code=401: 认证失败（Token缺失、无效或过期）
            - code=403: 业务规则限制（非草稿状态不能编辑）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultBoolean'
              examples:
                TC-UPDATE-001-预期响应-成功:
                  summary: 更新成功响应
                  value:
                    code: 200
                    message: "success"
                    data: true
                    timestamp: 1711700000000
                TC-UPDATE-003-预期响应-非草稿状态:
                  summary: 非草稿状态不能编辑
                  value:
                    code: 403
                    message: "只有草稿状态的工单可以编辑"
                    data: null
                    timestamp: 1711700000000

  /approvals/{id}/delete:
    post:
      tags:
        - 审批管理
      summary: 删除审批工单
      description: |
        **测试对象**: 删除工单接口（`POST /approvals/{id}/delete`）
        **测试目的**: 验证只有草稿状态的工单可以删除，且只有申请人可以删除。
        **前置条件**: 工单存在；用户是申请人；工单状态为草稿。
        **测试步骤**:
        1. 发送POST请求到`/approvals/{id}/delete`
        2. 验证删除结果
      operationId: deleteApproval
      parameters:
        - name: id
          in: path
          required: true
          description: 工单ID
          schema:
            type: integer
            format: int64
          examples:
            TC-DELETE-001-正常删除:
              summary: 删除草稿工单
              value: 1001
            TC-DELETE-002-非草稿状态:
              summary: 删除非草稿工单
              value: 1002
      responses:
        '200':
          description: |
            接口调用成功（HTTP 200），业务结果通过code字段区分：
            - code=200: 删除成功
            - code=401: 认证失败（Token缺失、无效或过期）
            - code=403: 业务规则限制（非草稿状态不能删除或无权限）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultBoolean'
              examples:
                TC-DELETE-001-预期响应-成功:
                  summary: 删除成功响应
                  value:
                    code: 200
                    message: "success"
                    data: true
                    timestamp: 1711700000000
                TC-DELETE-002-预期响应-非草稿状态:
                  summary: 非草稿状态不能删除
                  value:
                    code: 403
                    message: "只有草稿状态的工单可以删除"
                    data: null
                    timestamp: 1711700000000
                TC-DELETE-003-预期响应-无权删除:
                  summary: 无权删除
                  value:
                    code: 403
                    message: "无权删除该工单"
                    data: null
                    timestamp: 1711700000000

  # ==================== 审批流程操作接口 ====================
  /approvals/{id}/submit:
    post:
      tags:
        - 审批流程
      summary: 提交审批申请
      description: |
        **测试对象**: 提交申请接口（`POST /approvals/{id}/submit`）
        **测试目的**: 验证草稿状态的工单可以提交，提交后状态变为审批中。
        **前置条件**: 工单存在且状态为草稿；用户是申请人；已指定审批人。
        **业务规则**:
        - 只有申请人可以提交
        - 只有草稿状态的工单可以提交
        - 提交后状态变为审批中
        - 状态机触发SUBMIT事件
      operationId: submitApproval
      parameters:
        - name: id
          in: path
          required: true
          description: 工单ID
          schema:
            type: integer
            format: int64
          examples:
            TC-SUBMIT-001-正常提交:
              summary: 正常提交草稿工单
              value: 1001
            TC-SUBMIT-002-非草稿状态:
              summary: 提交非草稿工单
              value: 1002
            TC-SUBMIT-003-非申请人提交:
              summary: 非申请人尝试提交
              value: 1003
      responses:
        '200':
          description: 提交成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultBoolean'
              examples:
                TC-SUBMIT-001-预期响应:
                  summary: 提交成功响应
                  value:
                    code: 200
                    message: "success"
                    data: true
                    timestamp: 1711700000000
        '403':
          description: 业务规则限制
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultVoid'
              examples:
                TC-SUBMIT-002-预期响应:
                  summary: 非草稿状态不能提交
                  value:
                    code: 403
                    message: "当前状态不允许提交，请检查表单数据是否完整"
                    data: null
                    timestamp: 1711700000000
                TC-SUBMIT-003-预期响应:
                  summary: 只有申请人可以提交
                  value:
                    code: 403
                    message: "只有申请人可以提交工单"
                    data: null
                    timestamp: 1711700000000

  /approvals/{id}/approve:
    post:
      tags:
        - 审批流程
      summary: 审批通过
      description: |
        **测试对象**: 审批通过接口（`POST /approvals/{id}/approve`）
        **测试目的**: 验证审批人可以执行审批通过操作，状态变为已通过。
        **前置条件**: 工单状态为审批中；当前用户是该工单的当前审批人或有代审批权限。
        **业务规则**:
        - **直接审批**: 指定审批人可以执行审批操作
        - **管理员代审批**: 系统管理员(role=admin)拥有`approval:execute:all`权限时，可以代审批所有部门的工单
        - **部门经理代审批**: 部门经理(role=manager)拥有`approval:execute:dept`权限时，可以代审批本部门的工单
        - 只有审批中的工单可以审批
        - 审批通过后状态变为已通过
        - 记录审批意见到历史表（代审批时会标记审批类型和原审批人）
        - **权限层级**: 直接审批 > 管理员代审批 > 部门经理代审批 > 无权限
      operationId: approveApproval
      parameters:
        - name: id
          in: path
          required: true
          description: 工单ID
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
