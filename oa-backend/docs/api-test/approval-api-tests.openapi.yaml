components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: 登录成功后获取的JWT Token，在请求头中以 `Authorization:Bearer {token}` 格式传递

  schemas:
    # ==================== 基础响应结构 ====================
    Result:
      type: object
      description: 统一响应封装
      required:
        - code
        - message
        - timestamp
      properties:
        code:
          type: integer
          description: 状态码（200成功，400参数错误，401未授权，403禁止访问，404不存在，500系统异常）
          example: 200
        message:
          type: string
          description: 响应消息
          example: "success"
        data:
          description: 响应数据
          nullable: true
        timestamp:
          type: integer
          format: int64
          description: 服务器返回时间戳（毫秒）
          example: 1711700000000

    ResultVoid:
      type: object
      description: 无数据响应
      allOf:
        - $ref: '#/components/schemas/Result'
      properties:
        data:
          type: "null"

    ResultLong:
      type: object
      description: 返回Long类型数据（如工单ID）
      allOf:
        - $ref: '#/components/schemas/Result'
      properties:
        data:
          type: integer
          format: int64
          description: 工单ID
          example: 1001

    ResultBoolean:
      type: object
      description: 返回Boolean类型数据（操作是否成功）
      allOf:
        - $ref: '#/components/schemas/Result'
      properties:
        data:
          type: boolean
          description: 操作是否成功
          example: true

    # ==================== 审批相关请求DTO ====================
    ApprovalCreateRequest:
      type: object
      description: 创建审批工单请求DTO
      required:
        - title
        - type
      properties:
        title:
          type: string
          description: 审批标题
          minLength: 1
          example: "请假申请-2024年3月"
        type:
          type: integer
          description: 审批类型（1请假，2报销，3采购，4加班，5出差）
          example: 1
        priority:
          type: integer
          description: 优先级（0低，1普通，2紧急，默认1）
          default: 1
          example: 1
        content:
          type: string
          description: 申请内容
          example: "因家中有事，申请请假3天"
        formData:
          type: string
          description: 表单数据（JSON格式字符串）
          example: '{"leaveType": "事假", "startDate": "2024-03-15", "endDate": "2024-03-17", "days": 3}'
        currentApproverId:
          type: integer
          format: int64
          description: 当前审批人ID（提交时指定）
          example: 2

    ApprovalUpdateRequest:
      type: object
      description: 更新审批工单请求DTO
      required:
        - title
      properties:
        title:
          type: string
          description: 审批标题
          minLength: 1
          example: "请假申请-2024年3月（更新）"
        priority:
          type: integer
          description: 优先级（0低，1普通，2紧急，默认1）
          default: 1
          example: 2
        content:
          type: string
          description: 申请内容
          example: "因家中有事，申请请假3天（补充说明）"
        formData:
          type: string
          description: 表单数据（JSON格式字符串）
          example: '{"leaveType": "事假", "startDate": "2024-03-15", "endDate": "2024-03-17", "days": 3, "reason": "家中有事"}'
        currentApproverId:
          type: integer
          format: int64
          description: 当前审批人ID
          example: 2

    ApprovalActionCmd:
      type: object
      description: 审批操作命令DTO
      properties:
        comment:
          type: string
          description: 审批意见/备注
          example: "同意请假，安排好工作交接即可"
        nextApproverId:
          type: integer
          format: int64
          description: 下一审批人ID（多级审批时使用，暂不支持）
          example: null
        actionType:
          type: integer
          description: 审批事件类型（后端内部使用）
          example: 1

    # ==================== 审批相关响应DTO ====================
    ApprovalDetailResponse:
      type: object
      description: 审批工单详情响应DTO
      properties:
        id:
          type: integer
          format: int64
          description: 工单ID
          example: 1001
        title:
          type: string
          description: 审批标题
          example: "请假申请-2024年3月"
        type:
          type: integer
          description: 审批类型（1请假，2报销，3采购，4加班，5出差）
          example: 1
        typeName:
          type: string
          description: 审批类型名称
          example: "请假申请"
        applicantId:
          type: integer
          format: int64
          description: 申请人ID
          example: 3
        applicantName:
          type: string
          description: 申请人姓名
          example: "李四"
        currentApproverId:
          type: integer
          format: int64
          description: 当前审批人ID
          example: 2
        currentApproverName:
          type: string
          description: 当前审批人姓名
          example: "张经理"
        status:
          type: integer
          description: 状态（0草稿，1审批中，2已通过，3已打回，4已撤销）
          example: 1
        statusName:
          type: string
          description: 状态名称
          example: "审批中"
        priority:
          type: integer
          description: 优先级（0低，1普通，2紧急）
          example: 1
        priorityName:
          type: string
          description: 优先级名称
          example: "普通"
        content:
          type: string
          description: 申请内容
          example: "因家中有事，申请请假3天"
        formData:
          type: string
          description: 表单数据（JSON格式）
          example: '{"leaveType": "事假", "startDate": "2024-03-15", "endDate": "2024-03-17", "days": 3}'
        createTime:
          type: string
          format: date-time
          description: 创建时间
          example: "2024-03-10T09:00:00"
        updateTime:
          type: string
          format: date-time
          description: 更新时间
          example: "2024-03-10T10:30:00"

    ApprovalHistoryResponse:
      type: object
      description: 审批历史记录响应DTO（v1.1 新增代审批字段）
      properties:
        id:
          type: integer
          format: int64
          description: 历史记录ID
          example: 2001
        approvalId:
          type: integer
          format: int64
          description: 工单ID
          example: 1001
        approverId:
          type: integer
          format: int64
          description: 审批人ID（实际执行审批操作的用户）
          example: 2
        approverName:
          type: string
          description: 审批人姓名
          example: "张经理"
        action:
          type: integer
          description: 操作类型（0提交，1同意，2拒绝，3重新编辑，4撤销）
          example: 1
        actionName:
          type: string
          description: 操作类型名称
          example: "同意"
        comment:
          type: string
          description: 审批意见（代审批时会自动附加标识，如"[管理员代审批] 同意"）
          example: "同意请假，安排好工作交接即可"
        createTime:
          type: string
          format: date-time
          description: 操作时间
          example: "2024-03-10T14:30:00"
        # ========== 代审批相关字段（权限系统优化 v1.1 新增）==========
        approvalType:
          type: string
          description: |
            审批类型：
            - DIRECT：直接审批（指定审批人审批自己的工单）
            - PROXY_ADMIN：管理员代审批
            - PROXY_MANAGER：部门经理代审批
          enum: ["DIRECT", "PROXY_ADMIN", "PROXY_MANAGER"]
          example: "DIRECT"
        isProxy:
          type: integer
          description: 是否为代审批（0=否，1=是）
          enum: [0, 1]
          example: 0
        originalApproverId:
          type: integer
          format: int64
          description: 原指定审批人ID（代审批时记录，用于审计追踪）
          example: 2
          nullable: true
        originalApproverName:
          type: string
          description: 原指定审批人姓名（代审批时记录）
          example: "张经理"
          nullable: true
        proxyReason:
          type: string
          description: 代审批原因/备注
          example: "管理员代审批"
          nullable: true

    PageResult:
      type: object
      description: 分页查询结果封装
      properties:
        list:
          type: array
          description: 当前页数据列表
          items:
            type: object
        total:
          type: integer
          format: int64
          description: 总记录数
          example: 25
        pageNum:
          type: integer
          description: 当前页码
          example: 1
        pageSize:
          type: integer
          description: 每页大小
          example: 10
        pages:
          type: integer
          description: 总页数
          example: 3

    PageResultApprovalDetailResponse:
      type: object
      description: 审批工单分页结果
      allOf:
        - $ref: '#/components/schemas/PageResult'
      properties:
        list:
          type: array
          items:
            $ref: '#/components/schemas/ApprovalDetailResponse'

    # ==================== 复合响应类型 ====================
    ResultApprovalDetailResponse:
      type: object
      description: 审批工单详情响应
      allOf:
        - $ref: '#/components/schemas/Result'
      properties:
        data:
          $ref: '#/components/schemas/ApprovalDetailResponse'

    ResultPageApprovalDetailResponse:
      type: object
      description: 审批工单分页响应
      allOf:
        - $ref: '#/components/schemas/Result'
      properties:
        data:
          $ref: '#/components/schemas/PageResultApprovalDetailResponse'

    ResultListApprovalHistoryResponse:
      type: object
      description: 审批历史列表响应
      allOf:
        - $ref: '#/components/schemas/Result'
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/ApprovalHistoryResponse'

    # ==================== 权限系统相关Schema ====================
    ApprovalActionType:
      type: string
      description: |
        审批操作类型枚举（权限系统 v1.1 新增）
        - DIRECT: 直接审批（指定审批人审批自己的工单）
        - PROXY_ADMIN: 管理员代审批（系统管理员代审批所有部门工单）
        - PROXY_MANAGER: 部门经理代审批（部门经理代审批本部门工单）
      enum:
        - "DIRECT"
        - "PROXY_ADMIN"
        - "PROXY_MANAGER"
      example: "DIRECT"

    PermissionCheckResult:
      type: object
      description: 权限检查结果（内部使用，用于调试权限问题）
      properties:
        granted:
          type: boolean
          description: 是否授予权限
          example: true
        message:
          type: string
          description: 权限检查结果消息
          example: "直接审批"
        approvalActionType:
          $ref: '#/components/schemas/ApprovalActionType'
        originalApproverId:
          type: integer
          format: int64
          description: 原指定审批人ID（代审批时）
          example: 2
          nullable: true
