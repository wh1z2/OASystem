  /approvals/{id}/reject:
    post:
      tags:
        - 审批流程
      summary: 审批拒绝
      description: |
        **测试对象**: 审批拒绝接口（`POST /approvals/{id}/reject`）
        **测试目的**: 验证审批人可以执行审批拒绝操作，状态变为已打回。
        **前置条件**: 工单状态为审批中；当前用户是该工单的当前审批人或有代审批权限。
        **业务规则**:
        - **直接审批**: 指定审批人可以执行审批操作
        - **管理员代审批**: 系统管理员(role=admin)拥有`approval:execute:all`权限时，可以代审批所有部门的工单
        - **部门经理代审批**: 部门经理(role=manager)拥有`approval:execute:dept`权限时，可以代审批本部门的工单
        - 只有审批中的工单可以审批
        - 审批拒绝后状态变为已打回
        - 建议填写拒绝原因
        - 代审批时会标记审批类型和原审批人到历史记录
      operationId: rejectApproval
      parameters:
        - name: id
          in: path
          required: true
          description: 工单ID
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        description: 审批操作参数
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApprovalActionCmd'
            examples:
              TC-REJECT-001-正常审批拒绝:
                summary: "【正常】审批拒绝-直接审批"
                description: 指定审批人拒绝，填写拒绝原因
                value:
                  comment: "请假时间过长，建议缩短为2天"
              TC-REJECT-002-无拒绝原因:
                summary: "【正常】审批拒绝（无原因）"
                description: 审批拒绝但不填写原因
                value: {}
              TC-REJECT-004-管理员代审批拒绝:
                summary: "【正常】管理员代审批拒绝"
                description: 系统管理员代审批拒绝非本人指派的工单
                value:
                  comment: "管理员代审批：材料不齐全，请补充"
              TC-REJECT-005-经理跨部门代审批拒绝:
                summary: "【异常】部门经理不能跨部门代审批拒绝"
                description: 部门经理尝试代审批拒绝非本部门工单（应失败）
                value:
                  comment: "经理代审批拒绝"
      responses:
        '200':
          description: 拒绝成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultBoolean'
              examples:
                TC-REJECT-001-预期响应:
                  summary: 审批拒绝成功响应
                  value:
                    code: 200
                    message: "success"
                    data: true
                    timestamp: 1711700000000
        '403':
          description: 业务规则限制
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultVoid'
              examples:
                TC-REJECT-003-预期响应:
                  summary: 非审批人无权限拒绝
                  value:
                    code: 403
                    message: "无权执行审批操作，您不是当前审批人"
                    data: null
                    timestamp: 1711700000000
                TC-REJECT-006-预期响应-经理跨部门代审批拒绝:
                  summary: 部门经理不能跨部门代审批拒绝
                  value:
                    code: 403
                    message: "您只能审批本部门的工单"
                    data: null
                    timestamp: 1711700000000
                TC-REJECT-007-预期响应-非审批中状态:
                  summary: 非审批中状态不能拒绝
                  value:
                    code: 403
                    message: "只有审批中的工单可以执行审批操作"
